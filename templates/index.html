<!DOCTYPE html>
<html>
<head>
<title>Jashan Article CMS</title>
</head>

<body>

<h1>Article CMS</h1>

<a href="/login">
<button>Sign in with Microsoft</button>
</a>

<br><br>

<form action="/create" method="post">
Title:<br>
<input name="title"><br><br>

Author:<br>
<input name="author"><br><br>

Body:<br>
<textarea name="body"></textarea><br><br>

<button type="submit">Create</button>
</form>

<hr>

<h2>Articles</h2>

{% for post in posts %}
<h3>{{ post.title }}</h3>
<b>{{ post.author }}</b>
<p>{{ post.body }}</p>

{% if post.image_path %}
<img src="{{ imageSource }}{{ post.image_path }}" width="200">
{% endif %}

<hr>
{% endfor %}

</body>
</html>
